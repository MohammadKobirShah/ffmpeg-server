# docker-compose.yml
# FFmpeg HLS transcoding stack + Cloudflare Tunnel sidecar.
#
# Usage:
#   docker compose up -d                                # everything (Quick Tunnel)
#   TUNNEL_TOKEN=... PUBLIC_DOMAIN=https://hls.x.com \
#     docker compose up -d                              # Named tunnel
#   docker compose --profile monitoring up -d           # + Grafana/Prometheus
#   docker compose up -d --scale worker=8               # more transcoding capacity

networks:
  ffmpeg_net:
    driver: bridge

volumes:
  hls_data:
  redis_data:
  stream_cache:
  grafana_data:

services:
  # ─── Nginx HLS Server ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ffmpeg_nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - hls_data:/var/www/hls:ro
      - ./playlists:/var/www/playlists:ro
    networks: [ffmpeg_net]
    depends_on:
      - api
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ─── Node.js API ─────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ffmpeg_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - HLS_OUTPUT=/var/www/hls
      - PLAYLIST_DIR=/playlists
      - SEGMENT_DURATION=4
      - MAX_STREAMS=50
      # Used to build absolute URLs when the tunnel hasn't reported yet
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-}
    volumes:
      - hls_data:/var/www/hls
      - ./playlists:/playlists
    networks: [ffmpeg_net]
    depends_on:
      redis:
        condition: service_healthy

  # ─── FFmpeg Workers (scale me) ───────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - HLS_OUTPUT=/var/www/hls
      - SEGMENT_DURATION=4
      - WORKER_CONCURRENCY=2
      - FFMPEG_THREADS=0
    volumes:
      - hls_data:/var/www/hls
      - stream_cache:/tmp/stream_cache
    networks: [ffmpeg_net]
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ─── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ffmpeg_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    volumes:
      - redis_data:/data
    networks: [ffmpeg_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Cloudflare Tunnel sidecar ───────────────────────
  # Default mode = Quick Tunnel (random *.trycloudflare.com URL, no setup).
  # Named tunnel? Set TUNNEL_TOKEN (and ideally PUBLIC_DOMAIN) in your env / .env file.
  tunnel:
    build:
      context: ./tunnel
      dockerfile: Dockerfile
    container_name: ffmpeg_tunnel
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - TARGET_URL=http://nginx:8080
      - PROTOCOL=${TUNNEL_PROTOCOL:-http2}    # http2 | quic | auto
      - EDGE_REGION=${TUNNEL_REGION:-}        # blank=auto (fastest), or "us"
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-}      # set for named tunnels
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}        # set for token-based named tunnel
      - TUNNEL_NAME=${TUNNEL_NAME:-}          # if using cert-based named tunnel
      - EXTRA_ARGS=${TUNNEL_EXTRA_ARGS:-}
    volumes:
      # Optional: mount your cloudflared config for cert-based named tunnels
      # - ./tunnel/cloudflared:/etc/cloudflared:ro
    networks: [ffmpeg_net]
    depends_on:
      - nginx
      - redis

  # ─── Prometheus (optional) ───────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ffmpeg_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [ffmpeg_net]
    profiles: [monitoring]

  # ─── Grafana (optional) ──────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ffmpeg_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    networks: [ffmpeg_net]
    profiles: [monitoring]
