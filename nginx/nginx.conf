# nginx/nginx.conf — HLS edge for the FFmpeg server

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # HLS-aware MIME overrides (nginx ships these but be explicit)
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t                    ts;
    }

    log_format hls_log '$remote_addr - [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time';
    access_log /var/log/nginx/access.log hls_log;
    error_log  /var/log/nginx/error.log warn;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json
               application/javascript application/x-mpegURL
               application/vnd.apple.mpegurl;

    limit_req_zone  $binary_remote_addr zone=api_limit:10m   rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=stream_conn:10m;

    upstream api_backend {
        least_conn;
        server api:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 8080 default_server;
        server_name _;

        root /var/www;

        # ─── CORS (open) ────────────────────────────────
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        add_header X-Frame-Options        "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff"    always;

        # Preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ─── HLS streams (served from shared volume) ────
        location /hls/ {
            alias /var/www/hls/;
            limit_conn stream_conn 10;

            # Segments
            location ~* \.ts$ {
                add_header Cache-Control "public, max-age=31536000, immutable";
                add_header Access-Control-Allow-Origin '*' always;
            }

            # Playlists must NOT be cached (live)
            location ~* \.m3u8$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate" always;
                add_header Pragma        "no-cache" always;
                add_header Expires       "0" always;
                add_header Access-Control-Allow-Origin '*' always;
                default_type application/vnd.apple.mpegurl;
            }
        }

        # ─── Master playlists managed by API (file-backed) ─
        location /playlists/ {
            alias /var/www/playlists/;
            add_header Cache-Control "no-cache" always;
            default_type application/vnd.apple.mpegurl;
            add_header Access-Control-Allow-Origin '*' always;
        }

        # ─── API proxy ─────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api_backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ─── WebSocket for live updates ─────────────────
        location /ws {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # ─── Status page (internal only) ────────────────
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            deny  all;
        }
    }
}
